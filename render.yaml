################################################################################
# Autopy AI — Render (UN SOLO Web Service)
# Frontend + Backend juntos, base de datos Neon externa.
# Guía completa: README-RENDER.md
################################################################################

services:
  - type: web
    name: autopy-ai
    runtime: python
    region: oregon
    plan: free                   # cambia a "starter" para producción

    rootDir: .                   # raíz del monorepo

    # 1. Construye frontend + instala deps Python
    #    (render-build.sh instala pnpm en $HOME para evitar el error EROFS)
    buildCommand: bash render-build.sh

    # 2. Arranca FastAPI (sirve API + archivos estáticos del frontend)
    startCommand: >
      cd artifacts/api-server &&
      uvicorn main:app
      --host 0.0.0.0
      --port $PORT
      --workers 2

    healthCheckPath: /api/healthz

    envVars:
      - key: DATABASE_URL
        sync: false          # pega tu Neon URL aquí en el dashboard

      - key: OPENAI_API_KEY
        sync: false

      - key: GROQ_API_KEY
        sync: false

      - key: ADMIN_KEY
        sync: false          # string aleatorio seguro, ej: openssl rand -hex 32
